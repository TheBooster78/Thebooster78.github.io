<!DOCTYPE html>
<html>
	<head>
		<title>CACAAACAAAA</title>
		<meta charset="utf-8">
		<style type="text/css">
			body
			{
				margin: 0;
				padding: 0;
				background:url(cactus2.jpg) no-repeat black;
				-webkit-background-size: cover;
				-moz-background-size: cover;
				-o-background-size: cover;
				background-size: cover;
				height: 100vh;
			}
			#nocursor
			{
				cursor: none;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				position: fixed;
			}
		</style>
	</head>
	<body>
		<audio id="son" autoplay loop muted playsinline>
			<source src="out.mp3" type="audio/mpeg">
		</audio>

		<div id="nocursor"></div>

		<script>
			const son = document.getElementById('son');

			window.addEventListener('load', async () => {
				try {
					son.muted = true;
					await son.play();

					setTimeout(async () => {
						try {
							son.muted = false;
							son.volume = 1;
							await son.play();
						} catch (e) {
							console.log('Débloqué seulement après interaction utilisateur');
						}
					}, 300);
				} catch (e) {
					console.log('Autoplay bloqué par le navigateur');
				}
			});
		</script>
	</body>
</html>
