<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CACAAACAAAA</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      cursor: none;
    }

    #bg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <img id="bg" src="cactus2.jpg" alt="">
  <audio id="sound" autoplay preload="auto">
    <source src="son.mp3" type="audio/mpeg">
  </audio>

  <script>
    const sound = document.getElementById("sound");
    sound.play().catch(() => {
      console.log("Son auto bloqué par le navigateur");
    });
  </script>
</body>
</html>
